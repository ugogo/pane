name: Audit

# Dependency advisories are non-blocking and don't need to gate every PR, so
# they run on a weekly schedule (plus on demand) instead of in CI. A failure
# here is visible in the Actions tab without holding up day-to-day work.
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Audit production npm dependencies
        # Dev-only advisories (e.g. Vite/esbuild) are tracked separately via
        # Dependabot. Production deps are surfaced here, but the gate is set at
        # "high" rather than "moderate" on purpose: the Expo companion
        # (apps/mobile) pulls moderate advisories through its build tooling
        # (e.g. uuid <11.1.1 via xcode -> @expo/config-plugins) that can't be
        # resolved without bumping the pinned Expo SDK, and that chain isn't
        # reachable at runtime. Workspace hoisting means `npm audit` can't
        # isolate one workspace, so those known moderates would otherwise turn
        # the run red every week. They're still printed in the log for
        # visibility; only high/critical advisories — which are genuinely
        # actionable — fail the job.
        run: npm audit --omit=dev --audit-level=high

  cargo-audit:
    # Runs on Windows to match the Windows-only Cargo lockfile/targets.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies (RustSec)
        working-directory: apps/windows/tauri
        run: cargo audit
