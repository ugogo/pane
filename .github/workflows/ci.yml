name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1 -Configuration Release

      - name: Test
        shell: pwsh
        run: ./scripts/test.ps1 -Configuration Release
