name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for all jobs; widen per-job only if a step needs more.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/windows/tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Audit production npm dependencies
        # Dev-only advisories (e.g. Vite/esbuild) are tracked separately via
        # Dependabot. Production deps are surfaced here but kept non-blocking:
        # the Expo companion (apps/mobile) is pinned to the Expo Go-supported
        # SDK (54) and its tooling carries moderate advisories that can't be
        # fixed without bumping the SDK, and workspace hoisting means those
        # deps share node_modules with the desktop app, so `npm audit` can't
        # isolate one workspace. Mirrors the cargo-audit step below; flip to a
        # hard gate once the companion advisories are triaged or the apps are
        # audited in isolation.
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=moderate

      - name: Type-check frontend
        run: npm run typecheck

      - name: Lint frontend (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting (rustfmt)
        working-directory: apps/windows/tauri
        run: cargo fmt -- --check

      - name: Stage placeholder identity resources
        run: |
          # Release builds generate the signed identity artifacts before packaging; clippy only needs the configured resource paths to exist.
          New-Item -ItemType Directory -Force apps/windows/tauri/resources/identity | Out-Null
          New-Item -ItemType File -Force apps/windows/tauri/resources/identity/Pane-identity.msix | Out-Null
          New-Item -ItemType File -Force apps/windows/tauri/resources/identity/pane-codesign.cer | Out-Null

      - name: cargo clippy
        working-directory: apps/windows/tauri
        run: cargo clippy -- -D warnings

      - name: Check Tauri generated schemas match capabilities
        run: npm run tauri:gen:check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies (RustSec)
        working-directory: apps/windows/tauri
        # Non-blocking until the advisory baseline is confirmed clean; flip to a
        # hard gate (remove continue-on-error) once any existing advisories are
        # triaged or ignored via an audit.toml.
        continue-on-error: true
        run: cargo audit
