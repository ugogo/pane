name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for all jobs; widen per-job only if a step needs more.
permissions:
  contents: read

jobs:
  # Frontend quality gates need neither Rust nor Windows, so run them on the
  # faster/cheaper Linux runner in parallel with the Rust job below.
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run typecheck

      - name: Lint frontend (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

  # Rust is Windows-only (windows / ddc-winapi / windows-sys), so clippy and the
  # tauri:gen `cargo build` must run on Windows. tauri-build reads
  # tauri.conf.json frontendDist (../dist), so the frontend is built first to
  # produce dist/ before any Rust compilation.
  rust:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/windows/tauri
          # Pin the cache key independent of the job name. rust-cache otherwise
          # folds the job name into the key, so renaming this job would silently
          # bust the cache and force a full from-scratch compile. "build" matches
          # the pre-split key so existing main-branch caches keep being reused.
          shared-key: build

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting (rustfmt)
        working-directory: apps/windows/tauri
        run: cargo fmt -- --check

      - name: Stage placeholder identity resources
        run: |
          # Release builds generate the signed identity artifacts before packaging; clippy only needs the configured resource paths to exist.
          New-Item -ItemType Directory -Force apps/windows/tauri/resources/identity | Out-Null
          New-Item -ItemType File -Force apps/windows/tauri/resources/identity/Pane-identity.msix | Out-Null
          New-Item -ItemType File -Force apps/windows/tauri/resources/identity/pane-codesign.cer | Out-Null

      - name: cargo clippy
        working-directory: apps/windows/tauri
        run: cargo clippy -- -D warnings

      - name: Check Tauri generated schemas match capabilities
        run: npm run tauri:gen:check
