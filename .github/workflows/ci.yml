name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for all jobs; widen per-job only if a step needs more.
permissions:
  contents: read

jobs:
  # Frontend quality gates need neither Rust nor Windows, so run them on the
  # faster/cheaper Linux runner. This job also produces the dist/ bundle and
  # hands it to the Rust job as an artifact, so Windows never runs pnpm install or
  # Expo web build.
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm run typecheck

      - name: Lint frontend (ESLint)
        run: pnpm run lint

      - name: Check formatting (Prettier)
        run: pnpm run format:check

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: apps/windows/dist
          if-no-files-found: error
          retention-days: 1

  # Rust is Windows-only (windows / ddc-winapi / windows-sys), so clippy and the
  # tauri:gen `cargo build` must run on Windows. tauri-build reads
  # tauri.conf.json frontendDist (../dist), so it needs dist/ to exist — supplied
  # by the frontend job's artifact rather than rebuilt here. That lets this job
  # skip pnpm install and Expo web build entirely; it only needs node for the gen script.
  rust:
    runs-on: windows-latest
    needs: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/windows/tauri
          # Pin the cache key independent of the job name. rust-cache otherwise
          # folds the job name into the key, so renaming this job would silently
          # bust the cache and force a full from-scratch compile. "build" matches
          # the pre-split key so existing main-branch caches keep being reused.
          shared-key: build

      - name: Download frontend bundle
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: apps/windows/dist

      - name: Check Rust formatting (rustfmt)
        working-directory: apps/windows/tauri
        run: cargo fmt -- --check

      - name: Stage placeholder identity resources
        run: |
          # Release builds generate the signed identity artifacts before packaging; clippy only needs the configured resource paths to exist.
          New-Item -ItemType Directory -Force apps/windows/tauri/resources/identity | Out-Null
          New-Item -ItemType File -Force apps/windows/tauri/resources/identity/Pane-identity.msix | Out-Null
          New-Item -ItemType File -Force apps/windows/tauri/resources/identity/pane-codesign.cer | Out-Null

      - name: cargo clippy
        working-directory: apps/windows/tauri
        run: cargo clippy -- -D warnings

      - name: Check Tauri generated schemas match capabilities
        run: node scripts/sync-tauri-gen.ts --check
