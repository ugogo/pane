name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npx vite build

      - name: Stage placeholder identity resources
        run: |
          # Release builds generate the signed identity artifacts before packaging; clippy only needs the configured resource paths to exist.
          New-Item -ItemType Directory -Force src-tauri/resources/identity | Out-Null
          New-Item -ItemType File -Force src-tauri/resources/identity/Pane-identity.msix | Out-Null
          New-Item -ItemType File -Force src-tauri/resources/identity/pane-codesign.cer | Out-Null

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
